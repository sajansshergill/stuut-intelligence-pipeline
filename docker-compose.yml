services:
  airflow:
    image: apache/airflow:2.9.3-python3.11
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      DUCKDB_PATH: /opt/airflow/local/ar_intelligence.duckdb
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
      - ./ingestion:/opt/airflow/ingestion
      - ./quality:/opt/airflow/quality
      - ./requirements.txt:/opt/airflow/requirements.txt
      - ./requirements-dev.txt:/opt/airflow/requirements-dev.txt
      - ./data:/opt/airflow/data
      - ./local:/opt/airflow/local
    ports:
      - "8080:8080"
    command: >
      bash -c "pip install -r /opt/airflow/requirements-dev.txt || true;
      airflow db migrate;
      airflow standalone"

  dashboard:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    command: >
      bash -c "pip install -r requirements.txt &&
      streamlit run streamlit_app.py --server.address 0.0.0.0"
