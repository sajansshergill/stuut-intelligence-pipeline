name: dbt CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-and-dbt:
    runs-on: ubuntu-latest
    env:
      DUCKDB_PATH: local/ar_intelligence.duckdb
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: pytest tests/ -q

      - name: Compile dbt project
        run: mkdir -p local && dbt compile --project-dir dbt --profiles-dir dbt
